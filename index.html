<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jose Alfredo Ocegueda Sanchez · Atmospheric Sciences, Purdue</title>
  <meta name="description" content="Personal site of Jose Alfredo Ocegueda Sanchez — Ph.D. candidate in atmospheric sciences at Purdue, studying tropical cyclones, the ITCZ, and monsoon systems." />

  <!-- Theme color follows the active palette -->
  <meta name="theme-color" content="#171c2a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f6f4ed" media="(prefers-color-scheme: light)" />

  <!-- Fonts: editorial serif + clean sans + monospace -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ NAV (rendered by app.js) ============ -->
  <div data-nav="home" data-on-dark></div>

  <!-- ============ HERO ============ -->
  <section class="hero">
    <div class="hero__canvas">
      <video class="hero__video" autoplay muted loop playsinline preload="metadata"
             poster="assets/otis/otis-landfall-poster.png"
             aria-label="Hurricane Otis infrared satellite loop, October 25 2023">
        <source src="assets/otis/otis-landfall-480p.webm" type="video/webm" media="(min-width: 760px)" />
        <source src="assets/otis/otis-landfall-240p.webm" type="video/webm" />
      </video>
    </div>
    <div class="hero__grid"></div>
    <div class="hero__vignette"></div>

    <div class="hero__meta" data-hero-meta></div>

    <div class="hero__content" data-hero></div>

    <div class="hero__scroll">
      <span class="lang-en">Scroll</span><span class="lang-es">Desplaza</span>
      <div class="hero__scroll-line"></div>
    </div>
  </section>

  <!-- ============ 01 · ABOUT ============ -->
  <section class="block" id="about">
    <div class="wrap" data-about></div>
  </section>

  <!-- ============ 02 · NEWS TIMELINE ============ -->
  <section class="block" id="news">
    <div class="wrap" data-news></div>
  </section>

  <!-- ============ FOOTER (rendered by app.js) ============ -->
  <div data-footer></div>

  <!-- ============ TWEAKS PANEL (rendered by app.js) ============ -->
  <div data-tweaks></div>

  <!-- ============ SCRIPTS ============ -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
